<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: #1a1a1a;">
  <style>
    /* In questa fase tutte le stazioni appaiono graficamente uguali per non suggerire gli interscambi */
